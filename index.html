<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TODOアプリ</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./style.css">

    <!-- manifest.json -->
    <link rel="manifest" href="./manifest.json">

    <!-- PWA 用アイコン（iOS対策） -->
    <link rel="apple-touch-icon" href="./icons/icon-192.png">

    <!-- service-worker 登録 -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js");
            .then(() => console.log("SW 登録成功"))
            .catch(err => console.log("SW 登録失敗:", err));
        });
      }
    </script>
</head>
<body>

    <h1>
        <img src="./title.png" alt="TODOアプリ" id="titleImage">
    </h1>

    <div id="genreButtons">
        <button data-genre="work">仕事</button>
        <button data-genre="task">用事</button>
        <button data-genre="want">やりたいこと</button>
        <button data-genre="other">その他</button>
    </div>

    <!-- 今日の日付 -->
    <div id="today"></div>

    <!-- カレンダー -->
    <div id="calendar"></div>

    <div class="input-area task-area">
        <input id="taskInput" type="text" placeholder="タスクを入力">
    </div>

    <div class="input-area date-area">
        <input id="startDate" type="date">
        <input id="dueDate" type="date">
    </div>

    <button id="addBtn" class="pixel-btn">追加</button>

    <div class="note-area">
        <ul id="taskList"></ul>
    </div>

    <!-- メインスクリプト -->
    <script src="./script.js"></script>
</body>
</html>
